<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Cerâmica Plástica - Modelando Lucros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-transition { transition: width 0.5s ease-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 selection:bg-yellow-200">

    <div id="app" class="min-h-screen flex justify-center">
        <!-- Container Principal -->
        <div class="w-full max-w-5xl bg-white relative overflow-hidden flex flex-col shadow-2xl min-h-screen">
            
            <!-- Barra de Progresso Superior -->
            <div id="progress-container" class="w-[90%] max-w-2xl mx-auto mt-8 h-2 bg-[#fef08a] rounded-full relative z-10 overflow-hidden">
                <div id="progress-bar" class="h-full bg-[#eab308] progress-transition" style="width: 10%;"></div>
            </div>

            <!-- Área de Conteúdo -->
            <div id="content" class="flex-1 overflow-y-auto pb-16 pt-4 scroll-smooth">
                <!-- Conteúdo injetado via JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Estado da Aplicação
        const state = {
            step: 0,
            answers: {},
            loadingProgress: 0,
            questions: [
                {
                    id: 'experiencia',
                    preTitle: 'Pra começar, me conta uma coisa:',
                    titleBlack: 'Qual seu nível de experiência com\n',
                    titleYellow: 'Cerâmica Plástica?',
                    options: [
                        { emoji: '👩‍🎨', text: 'Já faço algumas peças, mas quero melhorar meus acabamentos' },
                        { emoji: '😅', text: 'Já tentei, mas tive dificuldades (massa quebrou, deu bolha)' },
                        { emoji: '🥰', text: 'Nunca fiz, mas quero começar do zero' }
                    ]
                },
                {
                    id: 'treinamento',
                    titleBlack: 'Esse vai ser o seu primeiro\ntreinamento com ',
                    titleYellow: 'Modelagem?',
                    options: [
                        { emoji: '🥰', text: 'Nunca fiz nenhum treinamento, esse será o primeiro' },
                        { emoji: '😅', text: 'Já fiz outro treinamento' },
                        { emoji: '🥳', text: 'Já fiz vários treinamentos' }
                    ]
                },
                {
                    id: 'tempo',
                    titleBlack: 'Quanto tempo você tem disponível\npara ',
                    titleYellow: 'aprender',
                    titleBlackSuffix: '?',
                    options: [
                        { emoji: '🕒', text: 'Entre 30 minutos a 1 hora' },
                        { emoji: '🕒', text: 'Entre 3 a 4 horas' },
                        { emoji: '🕒', text: 'Tenho muito tempo livre' }
                    ]
                },
                {
                    id: 'objetivo',
                    titleBlack: 'O que você mais deseja conquistar\ncom a ',
                    titleYellow: 'Cerâmica Plástica',
                    titleBlackSuffix: '?',
                    options: [
                        { emoji: '💲', text: 'Minha independência financeira e viver do que eu amo' },
                        { emoji: '🏡', text: 'Contribuir nas contas de casa e garantir mais tranquilidade pra mim e minha família' },
                        { emoji: '💜', text: 'Ter um tempo só meu, pra relaxar e colocar minha criatividade em prática' }
                    ]
                },
                {
                    id: 'meta',
                    titleBlack: 'Depois que você aprender as fazer as\npeças de ',
                    titleYellow: 'Cerâmica,',
                    titleBlackSuffix: ' qual será sua\nmeta?',
                    options: [
                        { emoji: '💸', text: 'Aprender como vender e lucrar com os brincos' },
                        { emoji: '🧶', text: 'Fazer apenas como um hobby' },
                        { emoji: '💲', text: 'Melhorar meus resultados no meu negócio atual' }
                    ]
                },
                {
                    id: 'estilo',
                    titleBlack: 'Você prefere qual estilo de ',
                    titleYellow: 'Brincos?',
                    hasContinueButton: true,
                    hideChevron: true,
                    allowMultiple: true,
                    options: [
                        { emoji: '🌸', text: 'Florais e Orgânicos' },
                        { emoji: '🔶', text: 'Geométricos e Modernos' },
                        { emoji: '🎨', text: 'Marmorizados e com Texturas' },
                        { emoji: '✨', text: 'Com acabamento em Resina' },
                        { emoji: '🌿', text: 'Minimalistas e Elegantes' },
                        { emoji: '😍', text: 'Todos os estilos' }
                    ]
                }
            ]
        };

        const contentEl = document.getElementById('content');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');

        function updateProgress() {
            const totalSteps = state.questions.length + 3;
            const percentage = state.step === 0 ? 10 : Math.min(100, (state.step / totalSteps) * 100);
            progressBar.style.width = `${percentage}%`;
            
            if (state.step >= state.questions.length + 3) {
                progressContainer.style.opacity = '0';
            } else {
                progressContainer.style.opacity = '1';
            }
        }

        function setStep(newStep) {
            state.step = newStep;
            render();
            updateProgress();
            window.scrollTo(0, 0);
        }

        function handleAnswer(questionId, answerText, autoAdvance, allowMultiple) {
            if (allowMultiple) {
                if (!state.answers[questionId]) state.answers[questionId] = [];
                const idx = state.answers[questionId].indexOf(answerText);
                if (idx > -1) {
                    state.answers[questionId].splice(idx, 1);
                } else {
                    state.answers[questionId].push(answerText);
                }
                render();
            } else {
                state.answers[questionId] = answerText;
                render();
                if (autoAdvance) {
                    setTimeout(() => setStep(state.step + 1), 300);
                }
            }
        }

        function render() {
            if (state.step === 0) renderIntro();
            else if (state.step <= state.questions.length) renderQuestion();
            else if (state.step === state.questions.length + 1) renderBridge();
            else if (state.step === state.questions.length + 2) renderTestimonials();
            else if (state.step === state.questions.length + 3) renderLoading();
            else renderPitch();
            
            lucide.createIcons();
        }

        function renderIntro() {
            contentEl.innerHTML = `
                <div class="animate-in max-w-4xl mx-auto w-full">
                    <div class="text-center px-4 pt-10 pb-6 md:pt-16 md:pb-10">
                        <h1 class="text-[24px] md:text-[40px] font-black text-gray-900 leading-tight tracking-tight font-montserrat uppercase">
                            A NOVA TENDÊNCIA DE 2026:<br />
                            <span class="inline-block bg-[#FFD700] text-white px-3 py-1 mt-2 rounded-sm md:mt-4">CERÂMICA PLÁSTICA</span>
                        </h1>
                    </div>
                    <div class="max-w-2xl mx-auto px-6 text-center text-[#222222] space-y-5 text-[16px] md:text-[18px] leading-[1.6]">
                        <p>Me chamo <strong>Luana Oliveira</strong>, e desde 2017 vivo 100% do artesanato com <strong class="text-[#FACC15]">Cerâmica Plástica</strong>.</p>
                        <p>Criei um jeito <strong>simples</strong> e <strong>lucrativo</strong> pra você começar do zero a faturar mais de <strong class="text-[#16a34a]">R$3.000,00</strong> por mês fazendo peças lindas como <strong>brincos e acessórios</strong>.</p>
                    </div>
                    <div class="max-w-md mx-auto mt-10 px-4 md:max-w-lg">
                        <img src="/images/intro-brincos.webp" alt="[Imagem de Brincos]" class="w-full aspect-[4/5] object-cover rounded-2xl border border-gray-100 shadow-md">
                    </div>
                    <div class="max-w-md mx-auto mt-8 px-4 md:max-w-lg">
                        <img src="/images/intro-processo.webp" alt="[Imagem de Processo]" class="w-full aspect-square object-cover rounded-2xl border border-gray-100 shadow-md">
                    </div>
                    <div class="max-w-2xl mx-auto px-6 mt-12 mb-16 text-center">
                        <button onclick="setStep(1)" class="w-full max-w-sm bg-[#fcd34d] hover:bg-[#fbbf24] text-black font-medium text-[18px] md:text-[20px] py-4 px-6 rounded-xl shadow-[0_4px_0_0_#d97706] active:translate-y-[4px] active:shadow-none transition-all">
                            Continuar!
                        </button>
                    </div>
                </div>
            `;
        }

        function renderQuestion() {
            const q = state.questions[state.step - 1];
            const isMultiple = q.allowMultiple;
            const currentAnswer = state.answers[q.id] || (isMultiple ? [] : '');

            let optionsHtml = q.options.map(opt => {
                const isSelected = isMultiple ? currentAnswer.includes(opt.text) : currentAnswer === opt.text;
                return `
                    <button onclick="handleAnswer('${q.id}', '${opt.text}', ${!q.hasContinueButton}, ${isMultiple})" 
                        class="w-full text-left bg-[#fffdf0] border-[1.5px] p-4 rounded-2xl flex items-center gap-4 transition-all ${isSelected ? 'border-[#facc15] bg-[#fef9c3]' : 'border-[#fde047]'}">
                        <span class="text-3xl shrink-0">${opt.emoji}</span>
                        <span class="font-medium text-[15px]">${opt.text}</span>
                    </button>
                `;
            }).join('');

            contentEl.innerHTML = `
                <div class="max-w-3xl mx-auto w-full animate-in px-6 py-12 md:py-20 flex flex-col justify-center min-h-[70vh]">
                    <div class="text-center mb-10 md:mb-14">
                        <h2 class="text-[25px] md:text-[36px] font-black text-[#111111] leading-[1.2] tracking-tight whitespace-pre-line font-montserrat">
                            ${q.titleBlack}<span class="text-[#ffda00]">${q.titleYellow}</span>
                        </h2>
                    </div>
                    <div class="max-w-xl mx-auto w-full space-y-4">${optionsHtml}</div>
                    ${q.hasContinueButton ? `
                        <div class="max-w-sm mx-auto w-full mt-8">
                            <button onclick="if(state.answers['${q.id}']?.length > 0) setStep(state.step + 1)" class="w-full bg-[#fcd34d] text-black font-medium py-4 rounded-xl shadow-[0_4px_0_0_#d97706] active:translate-y-[4px] active:shadow-none transition-all">Continuar</button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderBridge() {
            contentEl.innerHTML = `
                <div class="max-w-3xl mx-auto w-full animate-in px-6 py-12 md:py-20 flex flex-col justify-center">
                    <h2 class="text-[24px] md:text-[36px] font-black text-center mb-8 font-montserrat">
                        Precisa de forno especial ou <span class="text-[#ffda00]">ferramentas caras?</span>
                    </h2>
                    <div class="max-w-md mx-auto w-full mb-10">
                        <img src="/images/ferramentas.webp" alt="[Imagem de Ferramentas]" class="w-full aspect-[4/5] object-cover rounded-2xl shadow-md">
                    </div>
                    <button onclick="setStep(state.step + 1)" class="max-w-sm mx-auto w-full bg-[#fcd34d] text-black font-medium py-4 rounded-xl shadow-[0_4px_0_0_#d97706] active:translate-y-[4px] active:shadow-none transition-all">Continuar</button>
                </div>
            `;
        }

        function renderTestimonials() {
            contentEl.innerHTML = `
                <div class="max-w-4xl mx-auto w-full animate-in px-6 py-12 md:py-20 flex flex-col justify-center">
                    <h2 class="text-[23px] md:text-[38px] font-black text-center mb-10 font-montserrat">
                        Olha o que minhas alunas estão<br/>dizendo sobre o treinamento<br/>
                        <span class="inline-block bg-[#FFD700] text-white px-3 py-1 mt-2 rounded-sm uppercase">Modelando Lucros!</span>
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto w-full mb-14">
                        <img src="/images/prints-alunas.webp" alt="[Imagem de Print 1]" class="w-full object-cover rounded-2xl shadow-md border border-gray-100">
                        <img src="/images/prints-alunas2.webp" alt="[Imagem de Print 2]" class="w-full object-cover rounded-2xl shadow-md border border-gray-100">
                    </div>
                    <button onclick="setStep(state.step + 1)" class="max-w-sm mx-auto w-full bg-[#fcd34d] text-black font-medium py-4 rounded-xl shadow-[0_4px_0_0_#d97706] active:translate-y-[4px] active:shadow-none transition-all">Quero aprender!</button>
                </div>
            `;
        }

        function renderLoading() {
            contentEl.innerHTML = `
                <div class="max-w-3xl mx-auto w-full animate-in px-6 py-16 flex flex-col justify-center min-h-[70vh]">
                    <h2 class="text-[26px] md:text-[42px] font-black text-center mb-14 font-montserrat">
                        Você está a poucos passos de iniciar<br/>uma <span class="text-[#facc15]">GRANDE</span> <span class="bg-[#facc15] text-white px-2 rounded-sm inline-block">mudança</span>!
                    </h2>
                    <div class="w-full max-w-md mx-auto mb-8">
                        <div class="flex justify-between mb-3">
                            <span class="text-[#facc15] font-bold text-[18px]">Preparando seu treinamento</span>
                            <span id="loading-text" class="text-[#facc15] font-black text-[20px]">0%</span>
                        </div>
                        <div class="w-full h-4 bg-[#fef9c3] rounded-full overflow-hidden">
                            <div id="loading-bar" class="h-full bg-[#facc15] transition-all duration-75 ease-linear" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>
            `;

            let progress = 0;
            const bar = document.getElementById('loading-bar');
            const text = document.getElementById('loading-text');
            const interval = setInterval(() => {
                progress += 2;
                if (bar) bar.style.width = progress + '%';
                if (text) text.innerText = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => setStep(state.step + 1), 500);
                }
            }, 80);
        }

        function renderPitch() {
            const pricing = `
                <div class="flex flex-col mt-10 mb-8 max-w-lg mx-auto w-full">
                    <div class="bg-[#d1f5e0] rounded-t-xl p-6 flex items-center justify-between border-t border-x border-[#bbf7d0]">
                        <span class="text-[#16a34a] font-black text-[22px]">Curso Modelando Lucros</span>
                        <div class="text-right">
                            <p class="text-[#16a34a] font-black text-[40px] leading-none">R$ 37,00</p>
                        </div>
                    </div>
                    <button onclick="window.location.href='#'" class="w-full bg-[#fcd34d] text-[#111111] font-black text-[22px] py-6 rounded-b-xl shadow-[0_5px_0_0_#ca8a04] uppercase">Quero garantir minha vaga!</button>
                </div>
            `;

            contentEl.innerHTML = `
                <div class="max-w-4xl mx-auto w-full animate-in px-6 py-12 md:py-20 flex flex-col">
                    <h2 class="text-[24px] md:text-[36px] font-black text-center mb-10 font-montserrat">
                        Alguns dos <span class="text-[#eab308]">vários modelos</span> que você vai aprender comigo:
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-4xl mx-auto w-full mb-10">
                        <img src="/images/imagem1.webp" class="w-full aspect-square object-cover rounded-xl shadow-sm border">
                        <img src="/images/imagem2.webp" class="w-full aspect-square object-cover rounded-xl shadow-sm border">
                        <img src="/images/imagem3.webp" class="w-full aspect-square object-cover rounded-xl shadow-sm border">
                        <img src="/images/imagem4.webp" class="w-full aspect-square object-cover rounded-xl shadow-sm border">
                        <div class="col-span-2 md:col-span-1">
                            <img src="/images/imagem5.webp" class="w-full aspect-square object-cover rounded-xl shadow-sm border">
                        </div>
                    </div>
                    ${pricing}
                    <div class="max-w-md mx-auto w-full mt-10 mb-10">
                        <img src="/images/foto-autora.webp" class="w-full aspect-square object-cover rounded-2xl shadow-md">
                    </div>
                    <div class="text-center max-w-2xl mx-auto mb-10">
                        <h2 class="text-2xl font-black mb-4 font-montserrat">Luana Oliveira</h2>
                        <p class="text-gray-600 leading-relaxed">Criadora do treinamento Modelando Lucros. Minha missão é ajudar mulheres a conquistarem independência através da arte.</p>
                    </div>
                    ${pricing}
                </div>
            `;
        }

        // Início
        render();
    </script>
</body>
</html>
